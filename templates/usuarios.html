<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-oscuro: #0f3d1e;
            --verde-medio: #2e7d32;
            --verde-claro: #cfe5d6;
            --verde-hover: #1a5c2a;
            --bg: #eaeaea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'DM Sans', Arial;
        }

        body {
            background: var(--bg);
        }

        .header {
            background: var(--verde-oscuro);
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px;
        }

        .contenedor {
            display: flex;
        }

        .lista {
            flex: 1;
            display: flex;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            width: 200px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card-avatar img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .formulario {
            width: 300px;
            background: var(--verde-oscuro);
            color: white;
            padding: 20px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        /* BOTÓN CÁMARA */
        .input-file-contenedor {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-file {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--verde-medio);
            color: white;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-file:hover {
            background: var(--verde-hover);
        }

        .btn-file img {
            width: 20px;
            height: 20px;
        }

        #nombre-archivo {
            font-size: 12px;
            color: #ddd;
        }

        #preview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #2e7d32;
            display: none;
            margin-top: 10px;
        }

        /* BOTÓN GUARDAR */
        .btn-guardar {
            width: 100%;
            padding: 10px;
            background: var(--verde-medio);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-guardar:hover {
            background: var(--verde-hover);
            transform: scale(1.03);
        }

    </style>
</head>

<body>

<div class="header">
    <h2>Usuarios</h2>
</div>

<div class="contenedor">

    <!-- LISTA -->
    <div class="lista">

        {% for user in usuarios %}
        <div class="card">

            <div class="card-avatar">
                <img src="{% if user[1] %}/static/uploads/{{ user[1] }}.png{% else %}/static/user.png{% endif %}">
            </div>

            <p>{{ user[1] }}</p>

        </div>
        {% endfor %}

    </div>

    <!-- FORMULARIO -->
    <div class="formulario">

        <h3>Registrar Usuario</h3>

        <form method="POST" action="/Agregar_usuarios" enctype="multipart/form-data">

            <!-- NOMBRE -->
            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <!-- PERMISOS -->
            <label>Permisos</label>
            <label><input type="radio" name="rol" value="3" checked> Empleado</label>
            <label><input type="radio" name="rol" value="2"> Gerente</label>
            <label><input type="radio" name="rol" value="1"> Administrador</label>

            <!-- CONTRASEÑA -->
            <label>Contraseña</label>
            <input type="text" name="password" required>

            <!-- IMAGEN CON CÁMARA -->
            <div class="input-file-contenedor">

                <input type="file" id="Imagen" name="Imagen" accept="image/*" capture="environment" hidden onchange="previewImage(event)">

                <label for="Imagen" class="btn-file">
                    <img src="/static/camara.png">
                    <span>Elegir foto</span>
                </label>

                <span id="nombre-archivo">Ningún archivo seleccionado</span>

                <img id="preview">

            </div>

            <!-- BOTÓN GUARDAR -->
            <button type="submit" class="btn-guardar">Guardar Usuario</button>

        </form>

    </div>

</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('preview');
    const nombre = document.getElementById('nombre-archivo');

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        nombre.textContent = file.name;
    } else {
        preview.style.display = 'none';
        nombre.textContent = "Ningún archivo seleccionado";
    }
}
</script>

</body>
</html>

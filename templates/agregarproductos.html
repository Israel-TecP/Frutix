<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregar Productos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #eaeaea;
        }

        /* HEADER */
        .header {
            background: #1f5c2e;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 35px;
        }

        /* CONTENIDO */
        .contenedor {
            display: flex;
            padding: 20px;
            justify-content: space-between;
        }

        /* FORMULARIO */
        .form {
            width: 100%;
        }

        .form label {
            display: block;
            margin-top: 10px;
        }

        .form input {
            width: 100%;
            padding: 8px;
            background: #2e7d32;
            color: white;
            border: none;
            margin-top: 5px;
        }

        /* CATEGORÍAS */
        .categorias {
            width: 50%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .cat {
            background: #d7f0dc;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }

        .cat.activa {
            border: 3px solid #2e7d32;
            background: #a5d6a7;
        }

        .cat img {
            width: 40px;
        }

        /* BOTONES */
        .regresar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: none;
            border: none;
        }

        .regresar img {
            width: 40px;
        }

        .guardar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Agregar Producto</h1>
    </div>

    <div class="contenedor">

        <!-- FORM -->
        <form action="/agregarproductos.html" method="POST">
            <div class="form">
                <label>Nombre del producto:</label>
                <input type="text" name="nombre" required>

                <label>Cantidad:</label>
                <input type="number" name="cantidad" required>

                <label>Tipo de venta:</label>
                <input type="text" name="tipo_venta" required>

                <label>Precio:</label>
                <input type="number" name="precio" required>

                <label>Merma:</label>
                <input type="number" name="merma" required>
                <input type="hidden" name="categoria" id="categoriaSeleccionada">
                <button type="submit" class="btn btn-success w-100">Guardar Producto</button>
            </div>

        </form>

        <!-- CATEGORÍAS -->
        <div class="categorias">
            <h3>Seleccione la categoría:</h3>

            <div class="grid">

                <div class="cat" data-categoria="6">
                    <img src="/static/carne.png">
                    <div>Carnes</div>
                </div>

                <div class="cat" data-categoria="1">
                    <img src="/static/frutas.png">
                    <div>Frutas</div>
                </div>

                <div class="cat" data-categoria="3">
                    <img src="/static/abarrotes.png">
                    <div>Abarrotes</div>
                </div>

                <div class="cat" data-categoria="2">
                    <img src="/static/verduras.png">
                    <div>Verduras</div>
                </div>

                <div class="cat" data-categoria="4">
                    <img src="/static/condimentos.png">
                    <div>Condimentos</div>
                </div>

                <div class="cat" data-categoria="5">
                    <img src="/static/dulces.png">
                    <div>Dulces</div>
                </div>

            </div>
        </div>

    </div>

    <!-- Regresar al inventario -->
    <button class="regresar" onclick="regresar()">
        <img src="/static/atrass.png">
    </button>

    <script>
        document.querySelectorAll(".cat").forEach(cat => {
            cat.addEventListener("click", () => {
                document.querySelectorAll(".cat").forEach(c => c.classList.remove("activa"));
                cat.classList.add("activa");
                document.getElementById("categoriaSeleccionada").value =
                    cat.dataset.categoria;
            });
        });
        function regresar() {
            window.location.href = "/inventario";
        }
    </script>

</body>

</html>
